<!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Corpóreos
  </title>

  <link
    rel="stylesheet"
    href="./styles.css"
  >

</head>

<body>

  <main class="pantalla">

    <!-- PREVIEW -->

    <section class="preview">

      <div class="contenedorPreview">

        <div class="cartelDemo">

          TU CARTEL

        </div>

      </div>

    </section>


    <!-- CONTROLES -->

    <section class="panel">

      <h1 class="titulo">

        Probá tu cartel

      </h1>

      <p class="subtitulo">

        Subí una foto y personalizá tu fachada

      </p>


      <!-- FOTO -->

      <button class="botonPrincipal">

        Subir foto

      </button>


      <!-- TEXTO -->

      <input
        type="text"
        placeholder="Nombre del negocio"
        class="inputTexto"
      >


      <!-- BOTONES -->

      <div class="grupoBotones">

        <button class="botonControl">
          Color
        </button>

        <button class="botonControl">
          Tamaño
        </button>

        <button class="botonControl">
          Posición
        </button>

      </div>


      <!-- WHATSAPP -->

      <button class="botonWhatsapp">

        Solicitar visita

      </button>

    </section>

  </main>

  <script src="./app.js"></script>

</body>

</html>
