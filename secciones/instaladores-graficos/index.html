<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Instaladores Gráficos
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .contenedor{
      width:90%;
      max-width:600px;
      text-align:center;
    }

    h1{
      margin-bottom:40px;
    }

    .boton{
      display:block;
      width:100%;
      padding:20px;
      margin-bottom:20px;
      text-decoration:none;
      background:#1f2937;
      color:white;
      border-radius:12px;
      font-size:20px;
    }

    .boton:hover{
      background:#374151;
    }

  </style>

</head>

<body>

  <div class="contenedor">

    <h1>
      Elegí el producto
    </h1>

    <a
      href="corporeos/index.html"
      class="boton"
    >
      Corpóreos
    </a>

    <a
      href="lonas/index.html"
      class="boton"
    >
      Lonas
    </a>

    <a
      href="vinilos/index.html"
      class="boton"
    >
      Vinilos
    </a>

  </div>

</body>

</html>
